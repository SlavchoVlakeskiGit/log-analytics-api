name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: log_analytics_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_NAME: Log Analytics API
      APP_ENV: test
      APP_DEBUG: "false"
      API_V1_STR: /api/v1
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3307
      MYSQL_DB: log_analytics_test
      SECRET_KEY: test-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ALGORITHM: HS256

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest